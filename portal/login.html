<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Cline x1='14' y1='50' x2='42' y2='22' stroke='%2310b981' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='42' cy='22' r='3' fill='%2310b981'/%3E%3Cpath d='M48 12 L50 8 L52 12 L56 14 L52 16 L50 20 L48 16 L44 14Z' fill='%2310b981' opacity='0.6'/%3E%3Ccircle cx='36' cy='14' r='1.5' fill='%2310b981' opacity='0.4'/%3E%3C/svg%3E">
  <title>Client Portal — OrchestraFlow</title>
  <meta name="description" content="Log in to your OrchestraFlow client portal to view your personalized website redesign demo.">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px 40px; position: relative; }
    .login-page::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at top, rgba(59,130,246,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 48px 40px; width: 100%; max-width: 440px; position: relative; z-index: 1;
      box-shadow: var(--shadow-lg);
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px;
    }
    .login-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .login-header p { font-size: 0.9rem; color: var(--text-secondary); }

    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); }
    .form-input {
      padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; background: var(--bg-elevated);
      color: var(--text); transition: all 0.2s;
    }
    .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    .form-input::placeholder { color: var(--text-muted); }

    .login-btn {
      padding: 14px; background: #3b82f6; color: #fff; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all 0.2s; margin-top: 4px;
    }
    .login-btn:hover { background: #2563eb; box-shadow: 0 4px 20px rgba(59,130,246,0.3); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444; padding: 12px 16px; border-radius: 10px; font-size: 0.85rem;
      display: none;
    }

    .login-footer { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
    .login-footer p { font-size: 0.85rem; color: var(--text-muted); }
    .login-footer a { color: #3b82f6; font-weight: 600; }
    .login-footer a:hover { color: #2563eb; }

    .login-divider { display: flex; align-items: center; gap: 16px; margin: 8px 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-divider span { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<nav id="site-nav"></nav>

<section class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
          <line x1="14" y1="50" x2="42" y2="22" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
          <circle cx="42" cy="22" r="3" fill="#10b981"/>
          <path d="M48 12 L50 8 L52 12 L56 14 L52 16 L50 20 L48 16 L44 14Z" fill="#10b981" opacity="0.6"/>
          <path d="M54 26 L55 23 L56 26 L59 27 L56 28 L55 31 L54 28 L51 27Z" fill="#10b981" opacity="0.35" transform="scale(0.7) translate(22,10)"/>
          <circle cx="36" cy="14" r="1.5" fill="#10b981" opacity="0.4"/>
        </svg>
        <span style="font-weight:800;font-size:1.2rem;letter-spacing:-0.03em;color:var(--text);">orchestraflow</span>
      </div>
      <h1>Client Portal</h1>
      <p>Log in to view your website redesign demo</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="login-email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In →</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="/consultation">Request Access</a></p>
      <p style="margin-top:8px;"><a href="/solutions/web-development">← Back to Web Development</a></p>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="../js/shared.js"></script>
<script>
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    errorEl.style.display = 'none';
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/portal/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Invalid credentials. Please try again.';
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
        return;
      }

      console.log('Login successful, token/cookie should be set. Redirecting...');
      console.log('Response headers:', [...res.headers.entries()]);
      window.location.href = '/portal/dashboard';
    } catch (err) {
      errorEl.textContent = 'Connection error. Please try again.';
      errorEl.style.display = 'block';
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
