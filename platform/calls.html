<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call History — HeroCall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/platform/css/platform.css">
</head>
<body>
  <nav id="site-nav"></nav>

  <div class="platform-wrapper">
    <main class="platform-main">
      <div class="platform-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
        <div>
          <h1>Call History</h1>
          <p>View and manage all calls handled by your AI agents</p>
        </div>
        <button class="btn btn-ghost" onclick="exportCallsCSV(filteredCalls)">📥 Export CSV</button>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" class="form-input search-input" id="search-input" placeholder="🔍 Search by caller name or phone..." oninput="applyFilters()">
        <input type="date" class="form-input" id="date-from" onchange="applyFilters()" style="min-width:140px;">
        <input type="date" class="form-input" id="date-to" onchange="applyFilters()" style="min-width:140px;">
        <select class="form-input" id="outcome-filter" onchange="applyFilters()" style="min-width:180px;">
          <option value="">All Outcomes</option>
          <option value="appointment_booked">Appointment Booked</option>
          <option value="message_taken">Message Taken</option>
          <option value="info_provided">Info Provided</option>
          <option value="callback_requested">Callback Requested</option>
          <option value="voicemail">Voicemail</option>
          <option value="missed">Missed</option>
        </select>
      </div>

      <!-- Results Count -->
      <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:12px;" id="results-count"></div>

      <!-- Table -->
      <div class="panel">
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:24px;"></th>
                <th>Date & Time</th>
                <th>Caller</th>
                <th>Phone</th>
                <th>Duration</th>
                <th>Outcome</th>
              </tr>
            </thead>
            <tbody id="calls-body"></tbody>
          </table>
        </div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <div class="empty-state-icon">🔍</div>
          <h3>No calls found</h3>
          <p>Try adjusting your filters or search terms</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/shared.js"></script>
  <script src="/platform/js/platform.js"></script>
  <script>
    if (!isLoggedIn()) setAuth(MOCK_USER);
    injectSidebar('calls');

    let filteredCalls = [...MOCK_CALLS];

    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase().trim();
      const dateFrom = document.getElementById('date-from').value;
      const dateTo = document.getElementById('date-to').value;
      const outcome = document.getElementById('outcome-filter').value;

      filteredCalls = MOCK_CALLS.filter(call => {
        if (search && !call.caller.toLowerCase().includes(search) && !call.phone.includes(search)) return false;
        if (dateFrom && call.date < dateFrom) return false;
        if (dateTo && call.date > dateTo + ' 23:59') return false;
        if (outcome && call.outcome !== outcome) return false;
        return true;
      });

      renderCalls();
    }

    function renderCalls() {
      const tbody = document.getElementById('calls-body');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('results-count');

      count.textContent = `Showing ${filteredCalls.length} of ${MOCK_CALLS.length} calls`;

      if (filteredCalls.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      tbody.innerHTML = filteredCalls.map(call => {
        const outcome = formatOutcome(call.outcome);
        return `
          <tr class="expandable-row" onclick="toggleCallRow('${call.id}')">
            <td style="color:var(--text-muted);font-size:0.8rem;">▶</td>
            <td>${formatDate(call.date)}</td>
            <td><strong>${escapeHtml(call.caller)}</strong></td>
            <td>${escapeHtml(call.phone)}</td>
            <td>${call.duration}</td>
            <td><span class="badge ${outcome.class}">${outcome.label}</span></td>
          </tr>
          <tr class="expandable-content" id="call-expand-${call.id}">
            <td colspan="6">
              <div style="margin-bottom:10px;">
                <strong style="font-size:0.82rem;">Summary:</strong>
                <p style="font-size:0.82rem;color:var(--text-secondary);margin-top:4px;">${escapeHtml(call.summary)}</p>
              </div>
              ${call.transcript && call.transcript.length ? `
                <div class="transcript">
                  ${call.transcript.map(t => `
                    <div class="transcript-line">
                      <span class="transcript-speaker ${t.speaker}">${t.speaker === 'ai' ? '🤖 AI' : '👤 Caller'}:</span>
                      ${escapeHtml(t.text)}
                    </div>
                  `).join('')}
                </div>
              ` : '<p style="font-size:0.82rem;color:var(--text-muted);">No transcript available</p>'}
            </td>
          </tr>
        `;
      }).join('');
    }

    function toggleCallRow(id) {
      const row = document.getElementById('call-expand-' + id);
      if (row) row.classList.toggle('open');
    }

    // Initial render
    renderCalls();
  </script>
</body>
</html>
