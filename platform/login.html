<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — HeroCall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/platform/css/platform.css">
</head>
<body>
  <nav id="site-nav"></nav>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hc-grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34d399"/></linearGradient></defs><polygon points="36,4 16,34 30,34 26,60 50,26 34,26" fill="url(#hc-grad)"/></svg>
        <span>Hero<span style="color:#10b981">Call</span></span>
      </a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to manage your AI agents</p>

      <div id="alert" class="alert alert-error"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="sarah@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div style="text-align:right; margin-bottom:20px;">
          <a href="#" style="font-size:0.82rem; color:var(--text-muted);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" id="submit-btn">Log In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="/platform/signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script src="/platform/js/platform.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = '/platform/dashboard.html';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const alert = document.getElementById('alert');
      alert.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert.textContent = 'Please fill in all fields.';
        alert.classList.add('show');
        return;
      }

      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        setAuth(data.user || { ...MOCK_USER, email, token: data.token || MOCK_USER.token });
        window.location.href = '/platform/dashboard.html';
      } catch (err) {
        // Fallback: mock login for demo
        setAuth({ ...MOCK_USER, email });
        window.location.href = '/platform/dashboard.html';
      }
    }
  </script>
</body>
</html>
