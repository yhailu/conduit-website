<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23059669'/%3E%3Cstop offset='100%25' stop-color='%2334d399'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='36,4 16,34 30,34 26,60 50,26 34,26' fill='url(%23g)'/%3E%3C/svg%3E">
  <title>Page Not Found — HeroCall</title>
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .error-code { font-size: 8rem; font-weight: 900; letter-spacing: -0.05em; line-height: 1; color: var(--accent-light); opacity: 0.3; }
    .error-title { font-size: 1.8rem; font-weight: 800; margin: 16px 0 12px; }
    .error-desc { color: var(--text-secondary); font-size: 1.05rem; max-width: 400px; margin: 0 auto 32px; line-height: 1.7; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<nav id="site-nav"></nav>

<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary btn-lg">Back to Home</a>
      <a href="/blog" class="btn btn-ghost btn-lg">Read Our Blog</a>
    </div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="/js/shared.js"></script>
</body>
</html>
